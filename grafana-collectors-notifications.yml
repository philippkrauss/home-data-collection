apiVersion: 1

contactPoints:
  - orgId: 1
    name: Telegram
    receivers:
      - uid: telegram-receiver
        type: telegram
        settings:
          bottoken: YOUR_TELEGRAM_BOT_TOKEN
          chatid: "7392231297"
          message: |
            🚨 {{ .CommonAnnotations.summary }}
            
            {{ .CommonAnnotations.description }}
            
            Status: {{ .Status | toUpper }}
            Zeit: {{ .CommonLabels.alertname }}

policies:
  - orgId: 1
    receiver: Telegram
    group_by: [collector]
    group_wait: 5m
    group_interval: 5m
    repeat_interval: 4h