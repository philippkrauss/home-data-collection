# Telegraf Configuration for waerme-pi
# Collects: CPU usage, CPU temperature, Disk usage
# Writes to: InfluxDB 2.x

[agent]
  interval = "60s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "5s"
  flush_interval = "10s"
  flush_jitter = "5s"
  precision = "1s"
  hostname = "waerme-pi"
  omit_hostname = false

###############################################################################
# OUTPUT: InfluxDB 2.x
###############################################################################
[[outputs.influxdb_v2]]
  urls = ["http://localhost:8086"]
  token = "YOUR_INFLUX_TOKEN"
  organization = "YOUR_INFLUX_ORG"
  bucket = "system"

###############################################################################
# INPUT: CPU usage
###############################################################################
[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false
  report_active = false
  fieldpass = ["usage_user", "usage_system", "usage_iowait", "usage_idle"]

###############################################################################
# INPUT: Disk usage (root partition only)
###############################################################################
[[inputs.disk]]
  mount_points = ["/"]
  fieldpass = ["total", "used", "free", "used_percent"]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

###############################################################################
# INPUT: CPU Temperature
# Raspberry Pi exposes temperature in millidegrees via sysfs
# Raw value e.g. 45123 = 45.123°C — divide by 1000 in Grafana Flux query
###############################################################################
[[inputs.file]]
  files = ["/sys/class/thermal/thermal_zone0/temp"]
  name_override = "cpu_temperature"
  data_format = "value"
  data_type = "integer"