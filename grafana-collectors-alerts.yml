apiVersion: 1

groups:
  - orgId: 1
    name: collector-monitoring
    folder: Alerts
    interval: 5m
    rules:

      - uid: alert-uh50
        title: UH50 Collector
        condition: C
        for: 5m
        annotations:
          summary: UH50 hat seit mehr als 3 Stunden keine Daten geliefert
          description: Das uh50_influx.py Script scheint nicht zu laufen oder hat einen Fehler.
        labels:
          collector: uh50
          severity: warning
        data:
          - refId: A
            datasourceUid: ffg8agqls8ow0e
            model:
              query: |
                from(bucket: "waerme")
                  |> range(start: -3h)
                  |> filter(fn: (r) => r._measurement == "uh50")
                  |> count()
              queryType: flux
          - refId: C
            datasourceUid: "-100"
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              type: classic_conditions

